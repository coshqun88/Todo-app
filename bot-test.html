<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
  .box { background: white; border-radius: 12px; padding: 24px; width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  h2 { margin-bottom: 16px; color: #1a1208; }
  input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 14px; margin-bottom: 10px; outline: none; }
  input:focus { border-color: #c8622a; }
  button { width: 100%; background: #c8622a; color: white; border: none; border-radius: 8px; padding: 10px; font-size: 14px; cursor: pointer; }
  button:hover { background: #a8521a; }
  .result { margin-top: 16px; background: #faf7f2; border-radius: 8px; padding: 12px; font-size: 14px; line-height: 1.6; min-height: 60px; white-space: pre-wrap; }
  .loading { color: #999; font-style: italic; }
</style>
</head>
<body>
<div class="box">
  <h2>🤖 Bot Test Paneli</h2>
  <input type="text" id="msg" placeholder="Sual yazın... (məs: Menyu nədir?)" onkeydown="if(event.key==='Enter') test()">
  <button onclick="test()">Göndər</button>
  <div class="result" id="result">Cavab burada görünəcək...</div>
</div>
<script>
const SERVER = "https://modest-acceptance-production-686d.up.railway.app/"; // Railway URL-ini buraya yazın

  async function test() {
    const msg = document.getElementById("msg").value.trim();
    if (!msg) return;
    const res = document.getElementById("result");
    res.innerHTML = '<span class="loading">Cavab gözlənilir...</span>';
    try {
      const r = await fetch(SERVER + "/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg })
      });
      const data = await r.json();
      res.textContent = data.reply || JSON.stringify(data);
    } catch(e) {
      res.textContent = "Xəta: " + e.message;
    }
  }
</script>
</body>
</html>
