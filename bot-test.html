<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firuzə Restoran — AI Asistent</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #2c1810;
  background-image: radial-gradient(ellipse at 20% 50%, #3d2215 0%, #2c1810 60%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.scene {
  display: flex;
  align-items: center;
  gap: 48px;
}

.brand {
  color: #f5e6d3;
  max-width: 260px;
}

.brand-logo {
  width: 64px;
  height: 64px;
  background: #c8622a;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  color: white;
  font-weight: 600;
  margin-bottom: 20px;
  box-shadow: 0 8px 24px rgba(200,98,42,0.4);
}

.brand h1 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 10px;
  color: #f5e6d3;
}

.brand p {
  font-size: 14px;
  color: #a08060;
  line-height: 1.6;
  margin-bottom: 24px;
}

.brand-features {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.feature {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: #c8a882;
}

.feature-dot {
  width: 6px;
  height: 6px;
  background: #c8622a;
  border-radius: 50%;
  flex-shrink: 0;
}

.phone {
  width: 360px;
  height: 700px;
  background: #faf7f2;
  border-radius: 40px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 8px #1a0e08;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.phone::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 28px;
  background: #1a0e08;
  border-radius: 0 0 16px 16px;
  z-index: 10;
}

.hdr {
  background: #1a0e08;
  padding: 40px 18px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.hdr-av {
  width: 38px; height: 38px;
  background: #c8622a;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 17px;
  font-family: 'Playfair Display', serif;
  box-shadow: 0 0 0 2px rgba(200,98,42,0.3);
}

.hdr-info { flex: 1; }
.hdr-name { color: white; font-size: 15px; font-weight: 500; }
.hdr-sub { color: #a0c878; font-size: 11px; margin-top: 2px; display: flex; align-items: center; gap: 4px; }
.online-dot { width: 6px; height: 6px; background: #a0c878; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.msgs {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: #faf7f2;
}
.msgs::-webkit-scrollbar { width: 3px; }
.msgs::-webkit-scrollbar-thumb { background: #e0d5c8; border-radius: 2px; }

.msg { display: flex; gap: 8px; animation: fadeUp .25s ease; }
.msg.u { flex-direction: row-reverse; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.bbl {
  max-width: 78%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 13.5px;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.b .bbl {
  background: white;
  border: 1px solid #e8ddd0;
  border-radius: 4px 16px 16px 16px;
  color: #1a1208;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.msg.u .bbl {
  background: #c8622a;
  color: white;
  border-radius: 16px 4px 16px 16px;
}

.av {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #1a0e08;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  margin-top: 2px;
}

.typing-wrap { display: flex; gap: 8px; }
.typing-bbl {
  background: white;
  border: 1px solid #e8ddd0;
  border-radius: 4px 16px 16px 16px;
  padding: 12px 16px;
  display: flex; gap: 5px; align-items: center;
}
.typing-bbl span {
  width: 7px; height: 7px;
  background: #c8622a;
  border-radius: 50%;
  animation: bounce .9s infinite;
  opacity: 0.7;
}
.typing-bbl span:nth-child(2) { animation-delay: .15s; }
.typing-bbl span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

.bottom {
  flex-shrink: 0;
  background: #faf7f2;
  border-top: 1px solid #e8ddd0;
  padding-bottom: 8px;
}

.qrow {
  padding: 8px 12px 4px;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.qb {
  background: white;
  border: 1px solid #e0d5c8;
  border-radius: 16px;
  padding: 5px 12px;
  font-size: 12px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  color: #5a3e2b;
  transition: all .15s;
}
.qb:hover { background: #f0e8dc; border-color: #c8622a; color: #c8622a; }

.inp-row {
  padding: 6px 12px 10px;
  display: flex;
  gap: 8px;
}
.inp-row input {
  flex: 1;
  border: 1px solid #e0d5c8;
  border-radius: 22px;
  padding: 9px 16px;
  font-size: 13px;
  outline: none;
  background: white;
  color: #1a1208;
  font-family: 'DM Sans', sans-serif;
}
.inp-row input:focus { border-color: #c8622a; }
.inp-row input::placeholder { color: #b0a090; }

.sbtn {
  width: 38px; height: 38px;
  background: #c8622a;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: transform .1s, background .15s;
  box-shadow: 0 2px 8px rgba(200,98,42,0.4);
}
.sbtn:hover { transform: scale(1.05); background: #a8521a; }
.sbtn svg { width: 16px; height: 16px; fill: white; }

@media (max-width: 700px) {
  .scene { flex-direction: column; gap: 24px; }
  .brand { max-width: 360px; text-align: center; }
  .brand-logo { margin: 0 auto 20px; }
  .brand-features { align-items: center; }
  .phone { width: 100%; max-width: 360px; }
}
</style>
</head>
<body>

<div class="scene">
  <div class="brand">
    <div class="brand-logo">F</div>
    <h1>Firuzə  Restoran</h1>
    <p>Bakının ən isti restoran təcrübəsi. 7/24 AI asistentimiz suallarınızı cavablandırır.</p>
    <div class="brand-features">
      <div class="feature"><div class="feature-dot"></div>Menyu və qiymətlər</div>
      <div class="feature"><div class="feature-dot"></div>Masa rezervasiyası</div>
      <div class="feature"><div class="feature-dot"></div>Çatdırılma xidməti</div>
      <div class="feature"><div class="feature-dot"></div>7/24 onlayn dəstək</div>
    </div>
  </div>

  <div class="phone">
    <div class="hdr">
      <div class="hdr-av">L</div>
      <div class="hdr-info">
        <div class="hdr-name">Firuzə  Restoran</div>
        <div class="hdr-sub"><span class="online-dot"></span> İndi onlayn</div>
      </div>
    </div>

    <div class="msgs" id="msgs"></div>

    <div class="bottom">
      <div class="qrow">
        <button class="qb" onclick="q('Menyu nədir?')">🍽️ Menyu</button>
        <button class="qb" onclick="q('İş saatları?')">⏰ Saatlar</button>
        <button class="qb" onclick="q('Masa rezervasiya')">📅 Rezervasiya</button>
        <button class="qb" onclick="q('Çatdırılma varmı?')">🛵 Çatdırılma</button>
        <button class="qb" onclick="q('Ünvanınız?')">📍 Ünvan</button>
      </div>
      <div class="inp-row">
        <input id="inp" placeholder="Sualınızı yazın..." onkeydown="if(event.key==='Enter') send()"/>
        <button class="sbtn" onclick="send()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
var SERVER = "";

function addMsg(role, text) {
  var m = document.getElementById('msgs');
  var d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = '<div class="av">' + (role==='b' ? '👩‍🍳' : '👤') + '</div>'
              + '<div class="bbl">' + text + '</div>';
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
}

function showTyping() {
  var m = document.getElementById('msgs');
  var d = document.createElement('div');
  d.className = 'msg b'; d.id = 'typ';
  d.innerHTML = '<div class="av">👩‍🍳</div>'
              + '<div class="typing-bbl"><span></span><span></span><span></span></div>';
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
}

function removeTyping() {
  var t = document.getElementById('typ');
  if (t) t.parentNode.removeChild(t);
}

async function send() {
  var inp = document.getElementById('inp');
  var text = inp.value.replace(/^\s+|\s+$/g, '');
  if (!text) return;
  inp.value = '';
  addMsg('u', text);
  showTyping();
  try {
    var r = await fetch(SERVER + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    var data = await r.json();
    removeTyping();
    addMsg('b', data.reply || 'Xəta baş verdi.');
  } catch(e) {
    removeTyping();
    addMsg('b', 'Bağlantı xətası. Yenidən cəhd edin.');
  }
}

function q(text) {
  document.getElementById('inp').value = text;
  send();
}

setTimeout(function() {
  addMsg('b', 'Salam! 👋 Firuzə  Restoran-a xoş gəlmisiniz!\n\nMenyu, rezervasiya, çatdırılma — istənilən sualı verə bilərsiniz. 🍽️');
}, 400);
</script>

</body>
</html>
